openapi: 3.0.3
info:
  title: Order Service API
  version: v1
servers:
  - url: http://localhost:8082
paths:
  /api/orders:
    post:
      summary: Create order
      responses:
        '201':
          description: Created
  /api/orders/{orderId}:
    get:
      summary: Get order by id
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
  /api/orders/{orderId}/confirm:
    post:
      summary: Confirm order
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
