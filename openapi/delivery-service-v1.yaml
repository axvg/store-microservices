openapi: 3.0.3
info:
  title: Delivery Service API
  version: v1
servers:
  - url: http://localhost:8083
paths:
  /api/deliveries:
    post:
      summary: Create delivery
      responses:
        '201':
          description: Created
  /api/deliveries/{deliveryId}/status:
    put:
      summary: Update delivery status
      parameters:
        - in: path
          name: deliveryId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
