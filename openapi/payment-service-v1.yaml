openapi: 3.0.3
info:
  title: Payment Service API
  version: v1
servers:
  - url: http://localhost:8084
paths:
  /api/payments:
    post:
      summary: Create payment
      responses:
        '201':
          description: Created
  /api/payments/{paymentId}/refund:
    post:
      summary: Refund payment
      parameters:
        - in: path
          name: paymentId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
